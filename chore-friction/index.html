<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>家事ひっかかりログ</title>
<style>
  :root{
    --bg:#f6f5f2;
    --card:#ffffff;
    --ink:#2b2a27;
    --sub:#7c7a73;
    --line:#e7e4dd;
    --accent:#c2683a;
    --accent-soft:#f3e3d8;
    --ok:#5b8a72;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.05);
    --r:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    background:var(--bg);color:var(--ink);
    line-height:1.6;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) calc(96px + env(safe-area-inset-bottom)) env(safe-area-inset-left);
  }
  .wrap{max-width:560px;margin:0 auto;padding:20px 16px 0}
  header{margin:6px 2px 18px}
  h1{font-size:20px;margin:0;letter-spacing:.02em}
  .tag{font-size:12.5px;color:var(--sub);margin-top:4px}

  /* tabs */
  .tabs{display:flex;gap:6px;background:#ece9e2;border-radius:12px;padding:4px;margin-bottom:18px}
  .tabs button{
    flex:1;border:0;background:transparent;font:inherit;font-weight:600;
    color:var(--sub);padding:9px 0;border-radius:9px;cursor:pointer;font-size:14px;
    transition:.15s;
  }
  .tabs button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
  .pad{padding:16px}

  /* input */
  label{display:block;font-size:12.5px;color:var(--sub);font-weight:600;margin:0 0 8px 2px}
  .cats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .cats button{
    border:1px solid var(--line);background:#fafafa;font:inherit;font-size:13.5px;
    padding:8px 13px;border-radius:999px;cursor:pointer;color:var(--ink);transition:.12s;
  }
  .cats button:active{transform:scale(.95)}
  .cats button.on{background:var(--accent);border-color:var(--accent);color:#fff}

  textarea{
    width:100%;border:1px solid var(--line);border-radius:12px;background:#fafafa;
    font:inherit;font-size:15px;padding:12px;resize:none;color:var(--ink);
  }
  textarea:focus{outline:none;border-color:var(--accent);background:#fff}

  .row{display:flex;gap:12px;margin-top:16px}
  .row > div{flex:1}
  .lvl{display:flex;gap:6px}
  .lvl button{
    flex:1;border:1px solid var(--line);background:#fafafa;font:inherit;font-size:18px;
    padding:8px 0;border-radius:10px;cursor:pointer;transition:.12s;
  }
  .lvl button.on{background:var(--accent-soft);border-color:var(--accent)}
  .mins{display:flex;align-items:center;gap:8px}
  .mins input{
    width:100%;border:1px solid var(--line);border-radius:10px;background:#fafafa;
    font:inherit;font-size:16px;padding:9px 12px;color:var(--ink);text-align:center;
  }
  .mins input:focus{outline:none;border-color:var(--accent);background:#fff}
  .mins span{font-size:13px;color:var(--sub);white-space:nowrap}

  .save{
    width:100%;margin-top:18px;border:0;background:var(--accent);color:#fff;font:inherit;
    font-weight:700;font-size:16px;padding:15px;border-radius:13px;cursor:pointer;transition:.12s;
  }
  .save:active{transform:scale(.98)}
  .save:disabled{background:#d8d4cd;color:#fff}

  .hint{font-size:12px;color:var(--sub);text-align:center;margin:10px 2px 0}

  /* recent list */
  .recent{margin-top:22px}
  .recent h2{font-size:13px;color:var(--sub);margin:0 2px 10px;font-weight:700}
  .item{display:flex;gap:12px;padding:13px 14px;border-bottom:1px solid var(--line)}
  .item:last-child{border-bottom:0}
  .badge{flex:none;width:42px;height:42px;border-radius:11px;background:var(--accent-soft);
    display:grid;place-items:center;font-size:20px}
  .it-main{flex:1;min-width:0}
  .it-top{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
  .it-cat{font-size:12px;color:var(--accent);font-weight:700}
  .it-time{font-size:11.5px;color:var(--sub);flex:none}
  .it-text{font-size:14.5px;margin:2px 0 0;word-break:break-word}
  .it-meta{font-size:12px;color:var(--sub);margin-top:3px}
  .del{border:0;background:none;color:var(--sub);font-size:18px;cursor:pointer;padding:0 4px;flex:none}

  /* insights */
  .stats{display:flex;gap:12px;margin-bottom:18px}
  .stat{flex:1;text-align:center;padding:16px 8px}
  .stat .n{font-size:26px;font-weight:800;letter-spacing:.02em}
  .stat .l{font-size:11.5px;color:var(--sub);margin-top:2px}
  .sec-title{font-size:13px;font-weight:700;color:var(--sub);margin:24px 2px 12px}
  .bar-row{padding:13px 14px;border-bottom:1px solid var(--line)}
  .bar-row:last-child{border-bottom:0}
  .bar-top{display:flex;justify-content:space-between;align-items:baseline;font-size:14px;margin-bottom:7px}
  .bar-top .nm{font-weight:600}
  .bar-top .nm .ic{margin-right:6px}
  .bar-top .vv{font-size:12px;color:var(--sub)}
  .track{height:9px;background:#eee9e2;border-radius:5px;overflow:hidden}
  .fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#e0a06f,var(--accent))}
  .topnote{background:var(--accent-soft);border:1px solid #ecd5c4;border-radius:12px;padding:14px;
    font-size:14px;margin-bottom:18px;line-height:1.7}
  .topnote b{color:var(--accent)}
  .chips{display:flex;flex-wrap:wrap;gap:7px;padding:4px 2px}
  .chip{background:#f0ede6;border-radius:999px;padding:6px 12px;font-size:13px}
  .chip b{color:var(--accent);margin-left:4px}

  .empty{text-align:center;color:var(--sub);padding:48px 20px}
  .empty .em{font-size:40px;opacity:.5}
  .empty p{font-size:14px;margin:14px 0 0}

  /* toast */
  .toast{position:fixed;left:50%;bottom:calc(28px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;font-size:14px;padding:11px 20px;border-radius:999px;opacity:0;
    pointer-events:none;transition:.25s;z-index:50;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>家事ひっかかりログ</h1>
    <div class="tag">「あ、これめんどい」を一言。ためると、ムダが見えてくる。</div>
  </header>

  <div class="tabs">
    <button id="tabLog" class="on" onclick="show('log')">記録する</button>
    <button id="tabIns" onclick="show('ins')">気づき</button>
  </div>

  <!-- ========== LOG ========== -->
  <section id="viewLog">
    <div class="card pad">
      <label>どの家事？</label>
      <div class="cats" id="cats"></div>

      <label>何にひっかかった？</label>
      <textarea id="txt" rows="2" placeholder="例：洗濯物を干す場所が足りない / 何度も同じ場所を拭いてる"></textarea>

      <div class="row">
        <div>
          <label>イライラ度</label>
          <div class="lvl" id="lvl">
            <button data-l="1" title="まあまあ">🙂</button>
            <button data-l="2" class="on" title="ちょい">😑</button>
            <button data-l="3" title="かなり">😤</button>
          </div>
        </div>
        <div>
          <label>かかった時間</label>
          <div class="mins">
            <input id="mins" type="number" inputmode="numeric" min="0" placeholder="0">
            <span>分</span>
          </div>
        </div>
      </div>

      <button class="save" id="save" onclick="save()">記録する</button>
      <div class="hint">毎日ちょっとずつでOK。完璧に書かなくていい。</div>
    </div>

    <div class="recent" id="recent"></div>
  </section>

  <!-- ========== INSIGHTS ========== -->
  <section id="viewIns" class="hidden"></section>
</div>

<div class="toast" id="toast"></div>

<script>
const CATS=[
  {k:"料理",ic:"🍳"},{k:"洗濯",ic:"🧺"},{k:"掃除",ic:"🧹"},
  {k:"片付け",ic:"📦"},{k:"皿洗い",ic:"🍽️"},{k:"買い物",ic:"🛒"},
  {k:"ゴミ",ic:"🗑️"},{k:"その他",ic:"📝"}
];
const KEY="choreFriction.v1";
let entries=load();
let sel={cat:CATS[0].k,lvl:2};

function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]}}
function persist(){localStorage.setItem(KEY,JSON.stringify(entries))}
function icon(k){const c=CATS.find(c=>c.k===k);return c?c.ic:"📝"}

/* ---- build category buttons ---- */
const catsEl=document.getElementById('cats');
CATS.forEach(c=>{
  const b=document.createElement('button');
  b.textContent=c.ic+" "+c.k;
  if(c.k===sel.cat)b.classList.add('on');
  b.onclick=()=>{sel.cat=c.k;[...catsEl.children].forEach(x=>x.classList.remove('on'));b.classList.add('on')};
  catsEl.appendChild(b);
});
/* ---- level ---- */
document.querySelectorAll('#lvl button').forEach(b=>{
  b.onclick=()=>{sel.lvl=+b.dataset.l;document.querySelectorAll('#lvl button').forEach(x=>x.classList.remove('on'));b.classList.add('on')};
});

function save(){
  const t=document.getElementById('txt').value.trim();
  if(!t){toast("ひっかかった内容を書いてね");return}
  const m=parseInt(document.getElementById('mins').value)||0;
  entries.unshift({id:Date.now(),cat:sel.cat,text:t,lvl:sel.lvl,mins:m,ts:Date.now()});
  persist();
  document.getElementById('txt').value='';
  document.getElementById('mins').value='';
  renderRecent();
  toast("記録した ✓");
}

function del(id){
  entries=entries.filter(e=>e.id!==id);persist();renderRecent();renderIns();
}

function relTime(ts){
  const d=new Date(ts),now=new Date();
  const sameDay=d.toDateString()===now.toDateString();
  const y=new Date(now-864e5);
  if(sameDay)return "今日 "+hm(d);
  if(d.toDateString()===y.toDateString())return "昨日 "+hm(d);
  return (d.getMonth()+1)+"/"+d.getDate();
}
function hm(d){return d.getHours()+":"+String(d.getMinutes()).padStart(2,'0')}

function renderRecent(){
  const el=document.getElementById('recent');
  if(!entries.length){
    el.innerHTML='<div class="card empty"><div class="em">🫧</div><p>まだ記録がありません。<br>今日ひっかかった家事を1つ書いてみよう。</p></div>';
    return;
  }
  let h='<h2>さいきんの記録</h2><div class="card">';
  entries.slice(0,8).forEach(e=>{
    const face=["","🙂","😑","😤"][e.lvl];
    h+=`<div class="item">
      <div class="badge">${icon(e.cat)}</div>
      <div class="it-main">
        <div class="it-top"><span class="it-cat">${e.cat}</span><span class="it-time">${relTime(e.ts)}</span></div>
        <p class="it-text">${esc(e.text)}</p>
        <div class="it-meta">${face} ${e.mins?("· "+e.mins+"分"):""}</div>
      </div>
      <button class="del" onclick="del(${e.id})" title="削除">×</button>
    </div>`;
  });
  h+='</div>';
  el.innerHTML=h;
}

function renderIns(){
  const el=document.getElementById('viewIns');
  if(!entries.length){
    el.innerHTML='<div class="card empty"><div class="em">📊</div><p>記録がたまると、ここに<br>「どの家事がどれだけムダか」が見えてきます。</p></div>';
    return;
  }
  // aggregate by category
  const map={};
  entries.forEach(e=>{
    const a=map[e.cat]||(map[e.cat]={cat:e.cat,n:0,mins:0,lvlSum:0});
    a.n++;a.mins+=e.mins;a.lvlSum+=e.lvl;
  });
  const cats=Object.values(map);
  // "重さ" = 回数 × 平均イライラ × (1+分/10) — どこが一番ムダか
  cats.forEach(c=>{c.avgLvl=c.lvlSum/c.n;c.weight=c.n*c.avgLvl*(1+c.mins/30)});
  cats.sort((a,b)=>b.weight-a.weight);
  const maxW=Math.max(...cats.map(c=>c.weight));
  const days=new Set(entries.map(e=>new Date(e.ts).toDateString())).size;
  const totalMin=entries.reduce((s,e)=>s+e.mins,0);
  const top=cats[0];

  let h=`<div class="card stats" style="display:flex">
    <div class="stat"><div class="n">${entries.length}</div><div class="l">記録</div></div>
    <div class="stat"><div class="n">${days}</div><div class="l">日ぶん</div></div>
    <div class="stat"><div class="n">${totalMin}</div><div class="l">合計分</div></div>
  </div>`;

  if(entries.length>=3){
    h+=`<div class="topnote">いま一番ひっかかっているのは <b>${icon(top.cat)} ${top.cat}</b>。
      ${top.n}回記録され、平均イライラ度は ${top.avgLvl.toFixed(1)}${top.mins?`、合計${top.mins}分`:""}。
      <br>まずはここから見直すと効きそう。</div>`;
  }

  h+='<div class="sec-title">家事ごとの「ひっかかり度」</div><div class="card">';
  cats.forEach(c=>{
    const pct=Math.round(c.weight/maxW*100);
    h+=`<div class="bar-row">
      <div class="bar-top"><span class="nm"><span class="ic">${icon(c.cat)}</span>${c.cat}</span>
      <span class="vv">${c.n}回 · 平均${c.avgLvl.toFixed(1)}${c.mins?" · "+c.mins+"分":""}</span></div>
      <div class="track"><div class="fill" style="width:${Math.max(pct,6)}%"></div></div>
    </div>`;
  });
  h+='</div>';

  // recurring keywords
  const kw=keywords(entries);
  if(kw.length){
    h+='<div class="sec-title">繰り返し出てくる言葉</div><div class="chips">';
    kw.forEach(([w,n])=>{h+=`<span class="chip">${esc(w)}<b>${n}</b></span>`});
    h+='</div>';
  }
  el.innerHTML=h;
}

// crude JP/EN keyword frequency: drop particles & short tokens
const STOP=new Set("の が を に は と で も や へ から まで より て だ です ます する して した いる ある ない こと もの とき 自分 すごく ちょっと いつも 何度 また".split(/\s+/));
function keywords(list){
  const freq={};
  list.forEach(e=>{
    // split on non-word; also chunk hiragana runs out
    const raw=e.text.replace(/[、。!！?？,.\n\r「」（）()・…ー～]/g," ");
    raw.split(/\s+/).forEach(tok=>{
      tok=tok.trim();
      if(tok.length<2)return;
      if(STOP.has(tok))return;
      // skip pure-hiragana tokens shorter than 3 (likely grammar)
      if(/^[぀-ゟ]+$/.test(tok)&&tok.length<3)return;
      freq[tok]=(freq[tok]||0)+1;
    });
  });
  return Object.entries(freq).filter(([w,n])=>n>=2).sort((a,b)=>b[1]-a[1]).slice(0,10);
}

function esc(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}

let tt;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),1600);
}

function show(v){
  document.getElementById('viewLog').classList.toggle('hidden',v!=='log');
  document.getElementById('viewIns').classList.toggle('hidden',v!=='ins');
  document.getElementById('tabLog').classList.toggle('on',v==='log');
  document.getElementById('tabIns').classList.toggle('on',v==='ins');
  if(v==='ins')renderIns();
}

renderRecent();
</script>
</body>
</html>
